<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Helper - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --user-msg: #6366f1;
            --ai-msg: #334155;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--surface-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--surface-light);
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
        }

        .btn-new-chat {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-new-chat:hover {
            background: var(--primary-dark);
        }

        .conversations-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        .conversation-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--bg);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }

        .conversation-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        .conversation-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .conversation-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .conversation-item.active .conversation-date {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Main Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--surface-light);
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chat-settings {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .qa-mode-switch {
            display: flex;
            gap: 0.25rem;
            background: var(--bg);
            padding: 0.25rem;
            border-radius: 6px;
        }

        .mode-btn {
            padding: 0.4rem 0.8rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
        }

        .mode-btn:hover {
            color: var(--text);
        }

        /* Messages Area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .messages-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            color: var(--text-muted);
        }

        .messages-empty h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .messages-empty p {
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary);
            order: 2;
        }

        .message.ai .message-avatar {
            background: var(--surface);
            border: 1px solid var(--surface-light);
        }

        .message-content {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--primary);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .message.ai .message-content {
            background: var(--surface);
            border: 1px solid var(--surface-light);
            border-radius: 18px 18px 18px 4px;
            color: var(--text);
        }

        .message.ai .message-content h3 {
            color: var(--primary);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .message.ai .message-content strong {
            color: var(--secondary);
        }

        .message.ai .message-content code {
            background: var(--bg);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        .message.ai .message-content pre {
            background: var(--bg);
            padding: 0.75rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-size: 0.85rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .loading-indicator {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            padding: 0.75rem 1rem;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Input Area */
        .input-area {
            padding: 1.25rem;
            border-top: 1px solid var(--surface-light);
            background: var(--surface);
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--surface-light);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .btn-attach {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .btn-attach:hover {
            color: var(--primary);
        }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background 0.2s;
        }

        .btn-send:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Error/Warning */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .messages {
                max-width: 100%;
            }

            .message-content {
                max-width: 90%;
            }

            .chat-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--surface-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>💬 AI Study</h1>
            <button class="btn-new-chat" id="btnNewChat">+ New Chat</button>
        </div>
        <div class="conversations-scroll" id="conversationsScroll">
            <p style="text-align: center; color: var(--text-muted); padding: 1rem;">Tidak ada percakapan</p>
        </div>
    </div>

    <!-- Main Chat -->
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-title" id="chatTitle">Mulai percakapan baru</div>
            <div class="chat-settings">
                <div class="qa-mode-switch">
                    <button class="mode-btn active" data-mode="study" id="btnStudy">📚 Study</button>
                    <button class="mode-btn" data-mode="bff" id="btnBff">👯 ChitChat</button>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages">
            <div class="messages-empty">
                <h2>🎓 AI Study Helper</h2>
                <p>Tanya apa saja atau upload materi untuk belajar lebih efektif</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-box" style="flex: 1;">
                    <textarea class="input-field" id="messageInput" placeholder="Ketik pertanyaan..." rows="1"></textarea>
                    <div class="input-actions">
                        <button class="btn-attach" id="btnAttach" title="Lampirkan file">📎</button>
                        <input type="file" id="fileInput" accept=".pdf,.txt,.pptx,.jpg,.jpeg,.png,.webp" style="display: none;">
                    </div>
                </div>
                <button class="btn-send" id="btnSend">➤</button>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const conversationsScroll = document.getElementById('conversationsScroll');
        const messages = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const btnSend = document.getElementById('btnSend');
        const btnNewChat = document.getElementById('btnNewChat');
        const btnAttach = document.getElementById('btnAttach');
        const fileInput = document.getElementById('fileInput');
        const chatTitle = document.getElementById('chatTitle');
        const btnStudy = document.getElementById('btnStudy');
        const btnBff = document.getElementById('btnBff');

        let currentConvId = null;
        let qaHistory = [];
        let qaStyle = 'study';
        let currentFile = null;
        let isLoading = false;

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });

        // Send on Enter (Ctrl+Enter on mobile)
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        btnSend.addEventListener('click', sendMessage);
        btnNewChat.addEventListener('click', startNewChat);
        btnAttach.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);

        btnStudy.addEventListener('click', () => switchMode('study'));
        btnBff.addEventListener('click', () => switchMode('bff'));

        function switchMode(mode) {
            qaStyle = mode;
            btnStudy.classList.toggle('active', mode === 'study');
            btnBff.classList.toggle('active', mode === 'bff');
        }

        function startNewChat() {
            currentConvId = null;
            qaHistory = [];
            currentFile = null;
            messageInput.value = '';
            chatTitle.textContent = 'Mulai percakapan baru';
            messages.innerHTML = `
                <div class="messages-empty">
                    <h2>🎓 AI Study Helper</h2>
                    <p>Tanya apa saja atau upload materi untuk belajar lebih efektif</p>
                </div>
            `;
            document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
            loadConversations();
        }

        function handleFileSelect(e) {
            if (!e.target.files.length) return;
            const file = e.target.files[0];
            const validExts = ['pdf', 'txt', 'pptx', 'jpg', 'jpeg', 'png', 'webp'];
            const ext = file.name.split('.').pop().toLowerCase();

            if (validExts.indexOf(ext) === -1) {
                alert('File harus PDF, TXT, PPTX, JPG, PNG, atau WEBP');
                return;
            }

            if (file.size > 20 * 1024 * 1024) {
                alert('File terlalu besar (max 20MB)');
                return;
            }

            currentFile = file;
            const status = `📎 ${file.name} (${(file.size / 1024 / 1024).toFixed(2)}MB)`;
            alert(`File dipilih: ${status}`);
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // Clear input and resize
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Remove empty state
            if (messages.querySelector('.messages-empty')) {
                messages.innerHTML = '';
            }

            // Add user message
            addMessage(message, 'user');
            qaHistory.push({ role: 'user', content: message });

            // Show loading
            isLoading = true;
            showLoadingIndicator();

            try {
                const formData = new FormData();
                formData.append('mode', 'qa');
                formData.append('question', message);
                formData.append('qa_style', qaStyle);
                formData.append('history', JSON.stringify(qaHistory.slice(-8)));

                if (currentFile) {
                    formData.append('file', currentFile);
                }

                const response = await fetch('api.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    addMessage(`⚠️ ${data.error}`, 'ai');
                } else if (data.success) {
                    addMessage(data.result, 'ai');
                    qaHistory.push({ role: 'assistant', content: data.result });

                    if (data.conversation_id && !currentConvId) {
                        currentConvId = data.conversation_id;
                        chatTitle.textContent = message.substring(0, 50) + (message.length > 50 ? '...' : '');
                    }

                    loadConversations();
                }
            } catch (err) {
                addMessage(`❌ Error: ${err.message}`, 'ai');
            } finally {
                isLoading = false;
                removeLoadingIndicator();
                btnSend.disabled = false;
            }
        }

        function addMessage(content, role) {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            contentEl.innerHTML = role === 'ai' ? formatAIMessage(content) : escapeHTML(content);

            const timeEl = document.createElement('div');
            timeEl.className = 'message-time';
            timeEl.textContent = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            msgEl.appendChild(avatar);
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.flexDirection = 'column';
            wrapper.appendChild(contentEl);
            wrapper.appendChild(timeEl);
            msgEl.appendChild(wrapper);

            messages.appendChild(msgEl);
            messages.scrollTop = messages.scrollHeight;
        }

        function showLoadingIndicator() {
            const msgEl = document.createElement('div');
            msgEl.className = 'message ai';
            msgEl.id = 'loading-indicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const loader = document.createElement('div');
            loader.className = 'loading-indicator';
            loader.innerHTML = '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>';

            msgEl.appendChild(avatar);
            msgEl.appendChild(loader);
            messages.appendChild(msgEl);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeLoadingIndicator() {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();
        }

        function formatAIMessage(text) {
            return escapeHTML(text)
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        function escapeHTML(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        async function loadConversations() {
            try {
                const response = await fetch('conversations.php?action=list&limit=30');
                const data = await response.json();

                if (data.success && data.data && data.data.length > 0) {
                    let html = '';
                    data.data.forEach(conv => {
                        const date = new Date(conv.updated_at);
                        const dateStr = formatDate(date);
                        const title = escapeHTML(conv.title || 'Tanpa judul').substring(0, 40);
                        const isActive = conv.id === currentConvId ? ' active' : '';
                        
                        html += `<div class="conversation-item${isActive}" data-conv-id="${conv.id}">
                            <span>${title}</span>
                            <div class="conversation-date">${dateStr}</div>
                        </div>`;
                    });
                    conversationsScroll.innerHTML = html;

                    document.querySelectorAll('.conversation-item').forEach(el => {
                        el.addEventListener('click', () => {
                            const convId = parseInt(el.getAttribute('data-conv-id'));
                            loadConversation(convId);
                        });
                    });
                }
            } catch (err) {
                console.log('Failed to load conversations:', err);
            }
        }

        async function loadConversation(convId) {
            try {
                const response = await fetch(`conversations.php?action=get&id=${convId}`);
                const data = await response.json();

                if (data.success && data.data) {
                    currentConvId = convId;
                    qaHistory = data.data.map(msg => ({
                        role: msg.role,
                        content: msg.content
                    }));

                    // Update UI
                    messages.innerHTML = '';
                    qaHistory.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });

                    chatTitle.textContent = data.data[0]?.content?.substring(0, 50) || 'Percakapan dimuat';

                    document.querySelectorAll('.conversation-item').forEach(el => {
                        el.classList.remove('active');
                        if (parseInt(el.getAttribute('data-conv-id')) === convId) {
                            el.classList.add('active');
                        }
                    });
                }
            } catch (err) {
                alert('Gagal memuat percakapan: ' + err.message);
            }
        }

        function formatDate(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Baru saja';
            if (minutes < 60) return minutes + 'm';
            if (hours < 24) return hours + 'h';
            if (days < 7) return days + 'd';

            return date.toLocaleDateString('id-ID', { month: 'short', day: 'numeric' });
        }

        // Load conversations on start
        loadConversations();
    </script>
</body>
</html>
